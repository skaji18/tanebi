# TANEBI Event Schema Definition
# 全15種のイベントスキーマ定義
# See: docs/design.md Section 4.2

events:
  # ===== 記録系 =====

  task.created:
    description: "タスク作成時"
    payload:
      task_id: string
      request_summary: string

  # ===== Core → Executor =====

  decompose.requested:
    description: "CoreがDecomposeを依頼するイベント"
    direction: "Core → Event Store（Executor読取）"
    payload:
      task_id: string
      request_path: string      # work/{task_id}/request.md
      plan_output_path: string  # work/{task_id}/plan.round{N}.md
      round: integer            # ラウンド番号（初回=1, re-decompose=2+）
      checkpoint_feedback: "object?"  # re-decompose 時のみ（前ラウンドの失敗情報）

  execute.requested:
    description: "CoreがWorker実行を依頼するイベント"
    direction: "Core → Event Store（Executor読取）"
    payload:
      task_id: string
      subtask_id: string
      subtask_description: string  # サブタスクの説明
      wave: integer
      round: integer              # ラウンド番号
      output_path: string         # Worker の出力先パス（results/round{N}/{subtask_id}.md）

  aggregate.requested:
    description: "CoreがAggregateを依頼するイベント"
    direction: "Core → Event Store（Executor読取）"
    payload:
      task_id: string
      results_dir: string       # work/{task_id}/results/round{N}/
      report_path: string       # work/{task_id}/report.md
      round: integer            # ラウンド番号

  # ===== Executor → Core =====

  task.decomposed:
    description: "Decompose完了時"
    payload:
      task_id: string
      plan_path: string         # plan.round{N}.md のパス
      round: integer            # ラウンド番号

  worker.started:
    description: "Worker起動時"
    payload:
      task_id: string
      subtask_id: string
      wave: integer
      round: integer            # ラウンド番号

  worker.progress:
    description: "Worker中間出力時"
    payload:
      task_id: string
      subtask_id: string
      message: string
      percent: "number?"  # optional

  worker.completed:
    description: "Worker完了時"
    payload:
      task_id: string
      subtask_id: string
      status: "enum[success, failure]"
      quality: "enum[GREEN, YELLOW, RED]"
      domain: string
      wave: integer
      round: integer

  # ===== Core内部 =====

  wave.completed:
    description: "Wave内全Worker完了"
    payload:
      task_id: string
      wave: integer
      round: integer
      results_summary: object

  task.aggregated:
    description: "Aggregator完了後"
    payload:
      task_id: string
      report_path: string
      quality_summary: object

  # ===== Checkpoint =====

  checkpoint.requested:
    description: "Core → Executor: checkpoint wave の実行依頼"
    direction: "Core → Event Store（Executor読取）"
    payload:
      task_id: string
      subtask_id: string        # checkpoint subtask の ID
      subtask_type: checkpoint  # ExecutorListener が分岐するためのフラグ
      round: integer
      wave: integer
      request_path: string      # request.md のパス
      plan_path: string         # plan.round{N}.md のパス
      results_dir: string       # results/round{N}/ のパス
      output_path: string       # checkpoint 結果の出力先

  checkpoint.completed:
    description: "flow.py が checkpoint verdict 集約後に発火"
    payload:
      task_id: string
      round: integer
      verdict: "enum[pass, fail]"
      failed_subtasks: array  # attribution 情報を含む
      summary: string

  # ===== 例外 =====

  error.worker_failed:
    description: "Worker失敗時"
    payload:
      task_id: string
      subtask_id: string
      error_detail: string

  # ===== Learning Engine =====

  distill.requested:
    description: "蒸留処理の開始リクエスト"
    payload:
      task_id: string
      domain: string
      signal_count: integer
      signal_ids: array

  distill.completed:
    description: "蒸留処理の完了通知"
    payload:
      task_id: string
      domain: string
      patterns_created: array
      confidence: number

  learn.requested:
    description: "CoreがLearnerに知識抽出を依頼するイベント"
    direction: "Core → Event Store（Executor読取）"
    payload:
      task_id: string
      cmd_dir: string       # work/{task_id}/ のパス
      report_path: string   # work/{task_id}/report.md

  learn.completed:
    description: "Learner完了後のイベント"
    payload:
      task_id: string
      signals_created: integer  # 生成したシグナル数
      domains: array            # 対象ドメイン一覧
      distilled: bool           # 蒸留を実行したか
