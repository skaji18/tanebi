# TANEBI Event Schema Definition
# 全13種のイベントスキーマ定義
# See: docs/design.md Section 4.2

events:
  # ===== 記録系 =====

  task.created:
    description: "タスク作成時"
    payload:
      task_id:
        type: string
        required: true
      request:
        type: string
        required: true
      timestamp:
        type: string  # ISO 8601
        required: true

  # ===== Core → Executor =====

  decompose.requested:
    description: "CoreがDecomposeを依頼するイベント"
    direction: "Core → Event Store（Executor読取）"
    payload:
      cmd_dir: string  # 作業ディレクトリのパス
      request_file: string  # リクエストファイルのパス
      persona_file: string  # ペルソナファイルのパス

  execute.requested:
    description: "CoreがWorker実行を依頼するイベント"
    direction: "Core → Event Store（Executor読取）"
    payload:
      cmd_dir: string
      subtask_id: string  # サブタスクID
      request_file: string
      persona_file: string
      wave: integer  # Waveナンバー

  aggregate.requested:
    description: "CoreがAggregateを依頼するイベント"
    direction: "Core → Event Store（Executor読取）"
    payload:
      cmd_dir: string
      persona_file: string

  # ===== Executor → Core =====

  task.decomposed:
    description: "Decompose完了時"
    payload:
      cmd_id: string
      plan:
        subtasks: array
        waves: integer
        persona_assignments: array

  worker.started:
    description: "Worker起動時"
    payload:
      cmd_id: string
      subtask_id: string
      persona_id: string
      wave: integer

  worker.progress:
    description: "Worker中間出力時"
    payload:
      cmd_id: string
      subtask_id: string
      message: string
      percent: "number?"  # optional

  worker.completed:
    description: "Worker完了時"
    payload:
      cmd_id: string
      subtask_id: string
      status: "enum[success, failure]"
      quality: "enum[GREEN, YELLOW, RED]"
      domain: string

  # ===== Core内部 =====

  wave.completed:
    description: "Wave内全Worker完了"
    payload:
      cmd_id: string
      wave: integer
      results_summary: string

  task.aggregated:
    description: "Aggregator完了後"
    payload:
      cmd_id: string
      report_path: string
      quality_summary: string

  # ===== Checkpoint =====

  checkpoint.requested:
    description: "Core → Executor: checkpoint wave の実行依頼"
    direction: "Core → Event Store（Executor読取）"
    payload:
      task_id: string
      round: integer
      subtask_ids: array

  checkpoint.completed:
    description: "flow.py が checkpoint verdict 集約後に発火"
    payload:
      task_id: string
      round: integer
      verdict: "enum[pass, fail]"
      failed_subtasks: array  # attribution 情報を含む
      summary: string

  # ===== 例外 =====

  error.worker_failed:
    description: "Worker失敗時"
    payload:
      task_id:
        type: string
        required: true
      worker_id:
        type: string
        required: false  # optional
      error:
        type: string
        required: true
      timestamp:
        type: string  # ISO 8601
        required: true

  # Learning Engine Events
  distill.requested:
    description: "蒸留処理の開始リクエスト"
    payload:
      task_id:
        type: string
        required: true
      domain:
        type: string
        required: true
      signal_count:
        type: integer
        required: true
      signal_ids:
        type: array
        required: true
      timestamp:
        type: string
        required: true

  distill.completed:
    description: "蒸留処理の完了通知"
    payload:
      task_id:
        type: string
        required: true
      domain:
        type: string
        required: true
      patterns_created:
        type: array
        required: true
      confidence:
        type: number
        required: true
      timestamp:
        type: string
        required: true
