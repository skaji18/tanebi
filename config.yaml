# TANEBI設定ファイル
# design.md Section 9.4 準拠

tanebi:
  version: "1.0"

  # === モジュール・プラグイン設定 ===
  plugins:
    preset: "standard"         # minimal | standard | full | custom

    # custom時の個別設定
    trust:
      enabled: true
    progress:
      enabled: true
    approval:
      enabled: true
      plan_review: true
      wave_gate: false
      timeout_seconds: null
      danger_op_confirm: true
    cost:
      enabled: true
      budget: null
      show_per_subtask: true
      show_cumulative: true
    evolution:
      enabled: true
      show_on_complete: true
      verbose: false
    history:
      enabled: false
      auto_index: true

  # === パス設定 ===
  paths:
    work_dir: "work"
    persona_dir: "personas/active"
    library_dir: "personas/library"
    history_dir: "personas/history"
    knowledge_dir: "knowledge"
    few_shot_dir: "knowledge/few_shot_bank"
    episode_dir: "knowledge/episodes"

  # === 実行設定 ===
  execution:
    max_parallel_workers: 5
    worker_max_turns: 30
    default_model: "claude-sonnet-4-6"

  # === 進化エンジン設定 ===
  evolution:
    fitness_weights:
      quality_score: 0.35
      completion_rate: 0.30
      efficiency: 0.20
      growth_rate: 0.15
    fitness_window: 20           # 直近Nタスクのスライディングウィンドウ
    few_shot_max_per_domain: 100 # ドメイン毎の最大エントリ数
    snapshot_interval: 5         # N タスク毎に自動スナップショット
