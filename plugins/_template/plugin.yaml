plugin:
  name: "my_plugin"              # 一意の名前 [a-z_]+
  version: "1.0.0"               # セマンティックバージョン
  type: ui                       # core | ui
  description: "プラグインの説明"

  subscribes_to:                 # 購読するイベント
    - event_type: "task.created" # 購読するイベントタイプ
      handler: "on_task_created" # handler.sh内の関数名

  feedback_commands: []          # UI → Core フィードバック（type: ui のみ）

  lifecycle:
    on_init: "on_init"           # 初期化
    on_event: "on_event"         # イベント受信
    on_destroy: "on_destroy"     # 終了処理

  # type: ui のみ
  display:
    type: terminal               # terminal | file | web
    refresh_mode: event_driven   # event_driven | polling | manual

config:
  enabled: true
  # カスタム設定をここに追加
